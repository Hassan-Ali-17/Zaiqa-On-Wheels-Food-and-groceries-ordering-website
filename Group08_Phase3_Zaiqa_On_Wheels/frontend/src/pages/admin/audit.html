<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Admin — Audit Log</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--primary);background:rgba(255,77,0,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">ADMIN</span></a>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="restaurants.html" class="sidebar-link"><span class="sidebar-icon">🍽️</span> Restaurants</a>
    <div class="sidebar-section">People</div>
    <a href="riders.html" class="sidebar-link"><span class="sidebar-icon">🛵</span> Riders</a>
    <a href="users.html" class="sidebar-link"><span class="sidebar-icon">👥</span> Users</a>
    <a href="chat.html" class="sidebar-link"><span class="sidebar-icon">💬</span> Support Chat</a>
    <div class="sidebar-section">System</div>
    <a href="produce.html" class="sidebar-link"><span class="sidebar-icon">🥬</span> Produce Stock</a>
    <a href="audit.html" class="sidebar-link active"><span class="sidebar-icon">📋</span> Audit Log</a>
  </nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="page-title">Audit Log</div>
        <div class="page-subtitle">All system activity — last 50 events</div>
      </div>
      <button class="btn btn-outline" onclick="loadAudit()">↻ Refresh</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Time</th><th>User</th><th>Action</th><th>Details</th></tr>
        </thead>
        <tbody id="audit-tbody">
          <tr><td colspan="4" style="text-align:center;padding:2rem;"><div class="spinner" style="margin:auto;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('admin');
  renderUserBadge('nav-user');

  const actionColors = { SIGNUP:'var(--info)', LOGIN:'var(--success)', LOGOUT:'var(--text-muted)', PLACE_ORDER:'var(--primary)', UPDATE_ORDER_STATUS:'var(--warning)', ADD_RESTAURANT:'var(--success)', REMOVE_RESTAURANT:'var(--danger)', RIDER_APPROVAL:'var(--warning)', SEND_MESSAGE:'var(--info)', ADD_REVIEW:'var(--warning)' };

  async function loadAudit() {
    const data = await GET('/admin/audit');
    const tbody = document.getElementById('audit-tbody');
    if (!data?.length) { tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;">No logs yet</td></tr>'; return; }
    tbody.innerHTML = data.map(l=>`
      <tr>
        <td style="font-size:0.8rem;color:var(--text-muted);white-space:nowrap;">${formatDate(l.timestamp)}</td>
        <td style="font-size:0.9rem;">${l.user_name||'System'}</td>
        <td><span style="font-size:0.8rem;font-weight:700;color:${actionColors[l.action]||'var(--text)'};">${l.action}</span></td>
        <td style="font-size:0.85rem;color:var(--text-muted);">${l.details||'—'}</td>
      </tr>`).join('');
  }

  loadAudit();
  setInterval(loadAudit, 15000);
</script>
</body>
</html>
