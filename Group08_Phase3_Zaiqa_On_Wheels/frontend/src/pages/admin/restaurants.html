<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Admin — Restaurants</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--primary);background:rgba(255,77,0,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">ADMIN</span></a>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="restaurants.html" class="sidebar-link active"><span class="sidebar-icon">🍽️</span> Restaurants</a>
    <div class="sidebar-section">People</div>
    <a href="riders.html" class="sidebar-link"><span class="sidebar-icon">🛵</span> Riders</a>
    <a href="users.html" class="sidebar-link"><span class="sidebar-icon">👥</span> Users</a>
    <a href="chat.html" class="sidebar-link"><span class="sidebar-icon">💬</span> Support Chat</a>
    <div class="sidebar-section">System</div>
    <a href="produce.html" class="sidebar-link"><span class="sidebar-icon">🥬</span> Produce Stock</a>
    <a href="promos.html" class="sidebar-link"><span class="sidebar-icon">🎟️</span> Promo Codes</a>
    <a href="audit.html" class="sidebar-link"><span class="sidebar-icon">📋</span> Audit Log</a>
  </nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="page-title">Restaurants</div>
        <div class="page-subtitle">Approve manager submissions and manage all restaurants</div>
      </div>
      <button class="btn btn-primary" onclick="openModal('add-restaurant-modal')">+ Add Restaurant</button>
    </div>

    <div class="tabs" style="margin-bottom:1.5rem;">
      <button class="tab-btn active" onclick="filterRest('all',this)">All</button>
      <button class="tab-btn" onclick="filterRest('pending',this)" id="pending-rest-tab">⏳ Pending Approval</button>
      <button class="tab-btn" onclick="filterRest('approved',this)">✅ Approved</button>
    </div>

    <div id="restaurant-grid">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<!-- Add Restaurant Modal -->
<div class="modal-overlay" id="add-restaurant-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Restaurant</div>
      <button class="modal-close" onclick="closeModal('add-restaurant-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Restaurant Name *</label>
      <input type="text" id="r-name" class="form-control" placeholder="e.g. Burger Palace">
    </div>
    <div class="form-group">
      <label class="form-label">Cuisine Type</label>
      <select id="r-cuisine" class="form-control">
        <option>Fast Food</option><option>Italian</option><option>Pakistani</option>
        <option>Japanese</option><option>Chinese</option><option>BBQ</option><option>Seafood</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Location</label>
      <input type="text" id="r-location" class="form-control" placeholder="e.g. DHA Lahore">
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input type="text" id="r-phone" class="form-control" placeholder="03xx-xxxxxxx">
    </div>
    <div class="form-group">
      <label class="form-label">Delivery Time (minutes)</label>
      <input type="number" id="r-delivery-time" class="form-control" value="30">
    </div>
    <button class="btn btn-primary btn-full" onclick="addRestaurant()">Add Restaurant</button>
  </div>
</div>

<!-- Edit Restaurant Modal -->
<div class="modal-overlay" id="edit-restaurant-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Restaurant</div>
      <button class="modal-close" onclick="closeModal('edit-restaurant-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-r-id">
    <div class="form-group"><label class="form-label">Name</label><input type="text" id="edit-r-name" class="form-control"></div>
    <div class="form-group"><label class="form-label">Cuisine</label><select id="edit-r-cuisine" class="form-control"><option>Fast Food</option><option>Italian</option><option>Pakistani</option><option>Japanese</option><option>Chinese</option><option>BBQ</option></select></div>
    <div class="form-group"><label class="form-label">Location</label><input type="text" id="edit-r-location" class="form-control"></div>
    <div class="form-group"><label class="form-label">Phone</label><input type="text" id="edit-r-phone" class="form-control"></div>
    <div class="form-group"><label class="form-label">Delivery Time</label><input type="number" id="edit-r-time" class="form-control"></div>
    <button class="btn btn-primary btn-full" onclick="saveRestaurant()">Save Changes</button>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('admin');
  renderUserBadge('nav-user');

  let restaurants = [];
  let currentFilter = 'all';

  async function loadRestaurants() {
    const data = await GET('/admin/restaurants');
    restaurants = data || [];
    const pendingCount = restaurants.filter(r=>r.status==='pending').length;
    const ptab = document.getElementById('pending-rest-tab');
    if (pendingCount>0) ptab.textContent=`⏳ Pending (${pendingCount})`;
    renderRestaurants();
  }

  function filterRest(status, el) {
    currentFilter = status;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    if(el) el.classList.add('active');
    renderRestaurants();
  }

  function renderRestaurants() {
    const list = currentFilter==='all' ? restaurants : restaurants.filter(r=>r.status===currentFilter);
    const grid = document.getElementById('restaurant-grid');
    if (!list.length) {
      grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🍽️</div><p class="empty-text">No restaurants</p></div>`;
      return;
    }
    grid.innerHTML = `<div class="restaurant-grid">${list.map(r => `
      <div class="card" style="display:flex;flex-direction:column;gap:0.75rem;">
        <div style="display:flex;align-items:center;gap:1rem;">
          <div style="font-size:2.2rem;background:var(--bg3);border-radius:12px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;">
            ${r.image_filename ? `<img src="http://127.0.0.1:5000/uploads/${r.image_filename}" style="width:56px;height:56px;border-radius:12px;object-fit:cover;" onerror="this.parentElement.innerHTML='🍽️'">` : cuisineEmoji(r.cuisine)}
          </div>
          <div style="flex:1;">
            <div style="font-family:'Syne',sans-serif;font-weight:700;">${r.name}</div>
            <div style="color:var(--text-muted);font-size:0.8rem;">${r.cuisine} • ${r.location}</div>
            ${r.manager_name?`<div style="font-size:0.75rem;color:var(--info);">👤 ${r.manager_name}</div>`:''}
          </div>
          ${statusBadge(r.status)}
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          ${r.status==='pending' ? `<button class="btn btn-success btn-sm" style="flex:1;" onclick="approveRest(${r.id},'approved')">✓ Approve</button><button class="btn btn-danger btn-sm" style="flex:1;" onclick="approveRest(${r.id},'rejected')">✗ Reject</button>` : ''}
          ${r.status==='approved' ? `<button class="btn btn-outline btn-sm" style="flex:1;" onclick="editRestaurant(${r.id})">✏️ Edit</button>` : ''}
          <button class="btn btn-danger btn-sm" style="flex:1;" onclick="deleteRestaurant(${r.id},'${r.name}')">🗑</button>
        </div>
      </div>`).join('')}</div>`;
  }

  async function approveRest(id, status) {
    const res = await PUT(`/admin/restaurants/${id}/approve`, { status, admin_id: user.user_id });
    if (res?.success) { toast(`Restaurant ${status}`); loadRestaurants(); }
    else toast('Failed','error');
  }

  async function addRestaurant() {
    const name = document.getElementById('r-name').value.trim();
    if (!name) { toast('Restaurant name required','error'); return; }
    const res = await POST('/admin/restaurants', {
      name, cuisine: document.getElementById('r-cuisine').value,
      location: document.getElementById('r-location').value,
      phone: document.getElementById('r-phone').value,
      delivery_time: parseInt(document.getElementById('r-delivery-time').value)||30,
      admin_id: user.user_id
    });
    if (res?.success) { toast('Restaurant added!'); closeModal('add-restaurant-modal'); loadRestaurants(); }
    else toast('Failed','error');
  }

  function editRestaurant(id) {
    const r = restaurants.find(x=>x.id===id);
    if (!r) return;
    document.getElementById('edit-r-id').value=id;
    document.getElementById('edit-r-name').value=r.name;
    document.getElementById('edit-r-cuisine').value=r.cuisine;
    document.getElementById('edit-r-location').value=r.location;
    document.getElementById('edit-r-phone').value=r.phone;
    document.getElementById('edit-r-time').value=r.delivery_time;
    openModal('edit-restaurant-modal');
  }

  async function saveRestaurant() {
    const id = document.getElementById('edit-r-id').value;
    const res = await PUT(`/admin/restaurants/${id}`, {
      name:document.getElementById('edit-r-name').value,
      cuisine:document.getElementById('edit-r-cuisine').value,
      location:document.getElementById('edit-r-location').value,
      phone:document.getElementById('edit-r-phone').value,
      delivery_time:parseInt(document.getElementById('edit-r-time').value)
    });
    if (res?.success) { toast('Updated!'); closeModal('edit-restaurant-modal'); loadRestaurants(); }
    else toast('Failed','error');
  }

  async function deleteRestaurant(id, name) {
    if (!confirm(`Remove "${name}"?`)) return;
    const res = await DELETE(`/admin/restaurants/${id}`, {admin_id:user.user_id});
    if (res?.success) { toast('Removed'); loadRestaurants(); }
    else toast('Failed','error');
  }

  loadRestaurants();
</script>
</body>
</html>
