<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Admin — Promo Codes</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;background:rgba(255,77,0,0.15);color:var(--primary);padding:2px 8px;border-radius:4px;margin-left:4px;">ADMIN</span></a>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
    <div class="nav-user" id="nav-user"></div>
  </div>
</nav>

<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Management</div>
    <a href="produce.html" class="sidebar-link"><span class="sidebar-icon">🥬</span> Produce Stock</a>
    <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="restaurants.html" class="sidebar-link"><span class="sidebar-icon">🍽️</span> Restaurants</a>
    <a href="orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="riders.html" class="sidebar-link"><span class="sidebar-icon">🛵</span> Riders</a>
    <a href="users.html" class="sidebar-link"><span class="sidebar-icon">👥</span> Users</a>
    <a href="promos.html" class="sidebar-link active"><span class="sidebar-icon">🎟️</span> Promo Codes</a>
    <a href="audit.html" class="sidebar-link"><span class="sidebar-icon">📋</span> Audit Log</a>
    <div style="margin-top:auto;padding-top:2rem;">
      <button class="sidebar-link" onclick="logout()" style="width:100%;background:none;border:none;cursor:pointer;color:var(--danger);">
        <span class="sidebar-icon">🚪</span> Logout
      </button>
    </div>
  </nav>

  <main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <div>
        <div class="page-title">🎟️ Promo Codes</div>
        <div class="page-subtitle">Create and manage discount codes</div>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-modal')">+ Create Code</button>
    </div>

    <!-- Stats Row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;" id="promo-stats">
      <div class="stat-card"><div class="stat-label">Total Codes</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Codes</div><div class="stat-value" id="stat-active" style="color:#22C55E;">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Uses</div><div class="stat-value" id="stat-uses" style="color:var(--primary);">—</div></div>
    </div>

    <!-- Promo Codes Table -->
    <div class="card">
      <div id="promos-table"><div class="loader"><div class="spinner"></div></div></div>
    </div>
  </main>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal" style="max-width:460px;">
    <div class="modal-header">
      <div class="modal-title">Create Promo Code</div>
      <button class="modal-close" onclick="closeModal('create-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Code (e.g. SUMMER30)</label>
      <input type="text" id="new-code" class="form-control" placeholder="MYCODE" style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label class="form-label">Discount Type</label>
        <select id="new-type" class="form-control">
          <option value="percent">Percentage (%)</option>
          <option value="fixed">Fixed Amount (PKR)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Discount Value</label>
        <input type="number" id="new-value" class="form-control" placeholder="20" min="1">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label class="form-label">Min Order (PKR)</label>
        <input type="number" id="new-minorder" class="form-control" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Max Uses</label>
        <input type="number" id="new-maxuses" class="form-control" placeholder="100" min="1">
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem;">
      <button class="btn btn-outline" onclick="closeModal('create-modal')" style="flex:1;">Cancel</button>
      <button class="btn btn-primary" onclick="createPromo()" style="flex:1;">Create Code</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('admin');
  renderUserBadge('nav-user');

  async function loadPromos() {
    const promos = await GET('/admin/promos');
    if (!promos) return;

    document.getElementById('stat-total').textContent = promos.length;
    document.getElementById('stat-active').textContent = promos.filter(p=>p.is_active).length;
    document.getElementById('stat-uses').textContent = promos.reduce((s,p)=>s+p.used_count,0);

    if (!promos.length) {
      document.getElementById('promos-table').innerHTML = '<div class="empty-state"><div class="empty-icon">🎟️</div><p class="empty-text">No promo codes yet</p></div>';
      return;
    }

    document.getElementById('promos-table').innerHTML = `
      <table class="table">
        <thead><tr>
          <th>Code</th><th>Discount</th><th>Min Order</th><th>Uses</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${promos.map(p => `
            <tr>
              <td><span style="font-family:'Syne',sans-serif;font-weight:800;letter-spacing:1px;">${p.code}</span></td>
              <td><span style="color:var(--primary);font-weight:700;">${p.discount_type==='percent' ? p.discount_value+'% off' : 'PKR '+p.discount_value+' off'}</span></td>
              <td>PKR ${p.min_order || 0}</td>
              <td>${p.used_count} / ${p.max_uses}</td>
              <td>${p.is_active
                ? '<span class="badge badge-success">Active</span>'
                : '<span class="badge badge-danger">Disabled</span>'}</td>
              <td>
                <div style="display:flex;gap:0.5rem;">
                  <button class="btn btn-sm btn-outline" onclick="togglePromo(${p.id}, ${p.is_active})">
                    ${p.is_active ? '⏸ Disable' : '▶ Enable'}
                  </button>
                  <button class="btn btn-sm" style="background:var(--danger);color:white;" onclick="deletePromo(${p.id}, '${p.code}')">🗑</button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  async function createPromo() {
    const code = document.getElementById('new-code').value.trim();
    const val  = parseFloat(document.getElementById('new-value').value);
    if (!code || !val) { toast('Fill in code and value', 'error'); return; }

    const res = await POST('/admin/promos', {
      code, discount_type: document.getElementById('new-type').value,
      discount_value: val,
      min_order: parseFloat(document.getElementById('new-minorder').value)||0,
      max_uses: parseInt(document.getElementById('new-maxuses').value)||100,
      admin_id: user.user_id
    });

    if (res?.success) { toast(`✅ Code ${code} created!`); closeModal('create-modal'); loadPromos(); }
    else toast(res?.error || 'Code already exists', 'error');
  }

  async function togglePromo(id, isActive) {
    await PUT(`/admin/promos/${id}`, { is_active: isActive ? 0 : 1 });
    toast(isActive ? 'Promo disabled' : 'Promo enabled');
    loadPromos();
  }

  async function deletePromo(id, code) {
    if (!confirm(`Delete promo code "${code}"?`)) return;
    await fetch(`${API}/admin/promos/${id}`, { method: 'DELETE' });
    toast(`${code} deleted`);
    loadPromos();
  }

  loadPromos();
</script>
</body>
</html>
