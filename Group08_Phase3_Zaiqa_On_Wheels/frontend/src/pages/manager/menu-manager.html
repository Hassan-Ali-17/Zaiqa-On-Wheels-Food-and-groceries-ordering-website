<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Manager — Menu Manager</title>
  <link rel="stylesheet" href="../../css/main.css">
  <style>
    .menu-item-row { display:flex; align-items:center; gap:1rem; padding:0.85rem; background:var(--bg3); border-radius:12px; margin-bottom:0.5rem; border:1px solid var(--border); }
    .item-thumb { width:52px; height:52px; border-radius:10px; background:var(--bg); object-fit:cover; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
    .item-thumb img { width:52px; height:52px; border-radius:10px; object-fit:cover; }
    .item-info { flex:1; min-width:0; }
    .item-name-row { font-weight:600; font-size:0.9rem; }
    .item-sub { font-size:0.8rem; color:var(--text-muted); }
    .cat-section { margin-bottom:1.5rem; }
    .cat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; padding:0.5rem 0; border-bottom:1px solid var(--border); }
    .cat-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
    .img-upload-small { border:1px dashed var(--border); border-radius:10px; padding:0.75rem; text-align:center; cursor:pointer; font-size:0.8rem; color:var(--text-muted); margin-top:0.5rem; }
    .img-upload-small:hover { border-color:var(--primary); }
    .img-thumb-preview { width:60px; height:60px; border-radius:8px; object-fit:cover; margin-top:0.5rem; display:none; }
    .toggle-switch { position:relative; display:inline-block; width:42px; height:24px; }
    .toggle-switch input { display:none; }
    .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:var(--border); border-radius:24px; transition:.3s; }
    .toggle-slider::before { position:absolute; content:""; height:16px; width:16px; left:4px; bottom:4px; background:white; border-radius:50%; transition:.3s; }
    .toggle-switch input:checked + .toggle-slider { background:var(--success); }
    .toggle-switch input:checked + .toggle-slider::before { transform:translateX(18px); }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;background:rgba(168,85,247,0.15);color:#A855F7;padding:2px 8px;border-radius:4px;margin-left:4px;">MANAGER</span></a>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Restaurant</div>
    <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="menu-manager.html" class="sidebar-link active"><span class="sidebar-icon">🍽️</span> Menu Manager</a>
    <a href="orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="profile.html" class="sidebar-link"><span class="sidebar-icon">⚙️</span> Settings</a>
    <div style="margin-top:auto;padding-top:2rem;">
      <button class="sidebar-link" onclick="logout()" style="width:100%;background:none;border:none;cursor:pointer;color:var(--danger);">
        <span class="sidebar-icon">🚪</span> Logout
      </button>
    </div>
  </nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="page-title">Menu Manager</div>
        <div class="page-subtitle">Add categories and menu items</div>
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button class="btn btn-outline" onclick="openModal('add-cat-modal')">+ Add Category</button>
        <button class="btn btn-primary" onclick="openModal('add-item-modal')">+ Add Item</button>
      </div>
    </div>

    <div id="menu-container"><div class="loader"><div class="spinner"></div></div></div>
  </main>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="add-cat-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Category</div>
      <button class="modal-close" onclick="closeModal('add-cat-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Category Name</label>
      <input type="text" id="cat-name" class="form-control" placeholder="e.g. Burgers, Drinks, Desserts">
    </div>
    <button class="btn btn-primary btn-full" onclick="addCategory()">Add Category</button>
  </div>
</div>

<!-- Add / Edit Item Modal -->
<div class="modal-overlay" id="add-item-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="item-modal-title">Add Menu Item</div>
      <button class="modal-close" onclick="closeModal('add-item-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-item-id">
    <div class="form-group">
      <label class="form-label">Category</label>
      <select id="item-cat" class="form-control"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Item Name *</label>
      <input type="text" id="item-name" class="form-control" placeholder="e.g. Classic Burger">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="item-desc" class="form-control" rows="2" placeholder="Describe the item..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Price (PKR) *</label>
      <input type="number" id="item-price" class="form-control" placeholder="e.g. 450" min="1">
    </div>
    <div class="form-group">
      <label class="form-label">Item Photo</label>
      <div class="img-upload-small" onclick="document.getElementById('item-img-input').click()">📸 Click to upload item photo</div>
      <input type="file" id="item-img-input" accept="image/*" style="display:none" onchange="previewItemImg(this)">
      <img id="item-img-preview" class="img-thumb-preview">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveItem()">Save Item</button>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('manager');
  if (!user?.restaurant_id) window.location.href='setup.html';
  renderUserBadge('nav-user');

  const RID = user.restaurant_id;
  let restaurant = null;
  let itemImgB64 = null;
  let editingItemId = null;

  function previewItemImg(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      itemImgB64 = e.target.result;
      const img = document.getElementById('item-img-preview');
      img.src = e.target.result;
      img.style.display='block';
    };
    reader.readAsDataURL(file);
  }

  async function loadMenu() {
    restaurant = await GET(`/manager/restaurant/${RID}/menu`);
    if (!restaurant) {
      toast('Could not load menu — is backend running?', 'error');
      return;
    }
    const cats = restaurant.categories || [];

    // Populate category dropdown — only real categories (not "Uncategorised")
    const realCats = cats.filter(c => c.id !== null && c.id !== undefined);
    const catSel = document.getElementById('item-cat');
    catSel.innerHTML =
      '<option value="">— No Category —</option>' +
      realCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

    const el = document.getElementById('menu-container');

    // Show empty state only if NO real categories exist
    if (!realCats.length) {
      el.innerHTML=`<div class="empty-state"><div class="empty-icon">🍽️</div><p class="empty-text">No categories yet</p><p style="color:var(--text-muted);font-size:0.85rem;">Start by adding a category like "Burgers" or "Drinks"</p><button class="btn btn-primary" onclick="openModal('add-cat-modal')">+ Add Category</button></div>`;
      return;
    }

    el.innerHTML = cats.map(cat => `
      <div class="cat-section">
        <div class="cat-header">
          <div class="cat-title">${cat.name} <span style="color:var(--text-muted);font-size:0.8rem;font-family:'DM Sans',sans-serif;">(${cat.items.length} items)</span></div>
        </div>
        ${cat.items.length ? cat.items.map(item=>`
          <div class="menu-item-row" id="item-row-${item.id}">
            <div class="item-thumb">
              ${item.image_filename ? `<img src="http://127.0.0.1:5000/uploads/${item.image_filename}" onerror="this.parentElement.innerHTML='🍽️'">` : cuisineEmoji(restaurant.cuisine)}
            </div>
            <div class="item-info">
              <div class="item-name-row">${item.name}</div>
              <div class="item-sub">${item.description||'No description'}</div>
              <div style="color:var(--primary);font-weight:700;font-size:0.9rem;margin-top:0.2rem;">PKR ${item.price}</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <label class="toggle-switch" title="Available">
                <input type="checkbox" ${item.is_available?'checked':''} onchange="toggleItem(${item.id},this.checked)">
                <span class="toggle-slider"></span>
              </label>
              <button class="btn btn-outline btn-sm" onclick="openEditItem(${JSON.stringify(item).replace(/"/g,'&quot;')})">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">🗑</button>
            </div>
          </div>`).join('') : '<div style="color:var(--text-muted);font-size:0.85rem;padding:0.75rem 0;">No items in this category yet.</div>'}
      </div>`).join('');
  }

  async function addCategory() {
    const name = document.getElementById('cat-name').value.trim();
    if (!name) { toast('Category name required','error'); return; }
    const res = await POST('/manager/category', { restaurant_id:RID, name });
    if (res?.success) { toast('Category added!'); closeModal('add-cat-modal'); document.getElementById('cat-name').value=''; loadMenu(); }
    else toast('Failed','error');
  }

  function openAddItem() {
    editingItemId = null;
    itemImgB64 = null;
    document.getElementById('item-modal-title').textContent='Add Menu Item';
    document.getElementById('edit-item-id').value='';
    document.getElementById('item-name').value='';
    document.getElementById('item-desc').value='';
    document.getElementById('item-price').value='';
    document.getElementById('item-img-preview').style.display='none';
    openModal('add-item-modal');
  }

  function openEditItem(item) {
    editingItemId = item.id;
    document.getElementById('item-modal-title').textContent='Edit Menu Item';
    document.getElementById('edit-item-id').value=item.id;
    document.getElementById('item-cat').value=item.category_id||'';
    document.getElementById('item-name').value=item.name;
    document.getElementById('item-desc').value=item.description||'';
    document.getElementById('item-price').value=item.price;
    const prev = document.getElementById('item-img-preview');
    if (item.image_filename) { prev.src=`http://127.0.0.1:5000/uploads/${item.image_filename}`; prev.style.display='block'; }
    else prev.style.display='none';
    itemImgB64 = null;
    openModal('add-item-modal');
  }

  async function saveItem() {
    const name = document.getElementById('item-name').value.trim();
    const price = parseFloat(document.getElementById('item-price').value);
    if (!name||!price) { toast('Name and price required','error'); return; }
    const body = {
      restaurant_id: RID,
      category_id: parseInt(document.getElementById('item-cat').value)||null,
      name, price,
      description: document.getElementById('item-desc').value,
      image: itemImgB64,
      manager_id: user.user_id
    };
    let res;
    if (editingItemId) res = await PUT(`/manager/menu-item/${editingItemId}`, body);
    else res = await POST('/manager/menu-item', body);
    if (res?.success) { toast(editingItemId?'Item updated!':'Item added!'); closeModal('add-item-modal'); loadMenu(); }
    else toast('Failed','error');
  }

  async function toggleItem(id, available) {
    await PUT(`/manager/menu-item/${id}`, { name:'', price:0, is_available:available?1:0, _toggle:true });
    // silently update
  }

  async function deleteItem(id) {
    if (!confirm('Remove this item?')) return;
    const res = await DELETE(`/manager/menu-item/${id}`);
    if (res?.success) { toast('Item removed'); loadMenu(); }
  }

  // Override the add item button to use openAddItem
  document.querySelector('[onclick="openModal(\'add-item-modal\')"]').setAttribute('onclick','openAddItem()');

  loadMenu();
</script>
</body>
</html>
