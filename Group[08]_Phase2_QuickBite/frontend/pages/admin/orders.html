<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Admin — Orders</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--primary);background:rgba(255,77,0,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">ADMIN</span></a>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="orders.html" class="sidebar-link active"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="restaurants.html" class="sidebar-link"><span class="sidebar-icon">🍽️</span> Restaurants</a>
    <div class="sidebar-section">People</div>
    <a href="riders.html" class="sidebar-link"><span class="sidebar-icon">🛵</span> Riders</a>
    <a href="users.html" class="sidebar-link"><span class="sidebar-icon">👥</span> Users</a>
    <a href="chat.html" class="sidebar-link"><span class="sidebar-icon">💬</span> Support Chat</a>
    <div class="sidebar-section">System</div>
    <a href="promos.html" class="sidebar-link"><span class="sidebar-icon">🎟️</span> Promo Codes</a>
    <a href="audit.html" class="sidebar-link"><span class="sidebar-icon">📋</span> Audit Log</a>
  </nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="page-title">All Orders</div>
        <div class="page-subtitle">View and manage all customer orders</div>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <select id="status-filter" class="form-control" style="width:auto;" onchange="filterOrders()">
          <option value="all">All Statuses</option>
          <option value="Pending">Pending</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Preparing">Preparing</option>
          <option value="Out for Delivery">Out for Delivery</option>
          <option value="Delivered">Delivered</option>
          <option value="Cancelled">Cancelled</option>
        </select>
        <button class="btn btn-outline" onclick="loadOrders()">↻ Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Restaurant</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="7" style="text-align:center;padding:2rem;"><div class="spinner" style="margin:auto;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="order-detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="order-modal-title">Order Details</div>
      <button class="modal-close" onclick="closeModal('order-detail-modal')">✕</button>
    </div>
    <div id="order-modal-content"></div>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('admin');
  renderUserBadge('nav-user');

  let allOrders = [];

  async function loadOrders() {
    const data = await GET('/admin/orders');
    allOrders = data || [];
    filterOrders();
  }

  function filterOrders() {
    const filter = document.getElementById('status-filter').value;
    const list = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);
    const tbody = document.getElementById('orders-tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">No orders found</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(o => `
      <tr>
        <td><strong>#${o.id}</strong>${o.order_type==='produce'?'<br><span style="font-size:0.7rem;background:rgba(34,197,94,0.15);color:#22C55E;border-radius:4px;padding:1px 5px;">🥬 PRODUCE</span>':''}</td>
        <td>${o.customer_name}</td>
        <td>${o.restaurant_name}</td>
        <td style="color:var(--primary);font-weight:600;">PKR ${o.total_amount?.toFixed(0)}</td>
        <td>${statusBadge(o.status)}</td>
        <td style="color:var(--text-muted);font-size:0.85rem;">${timeAgo(o.created_at)}</td>
        <td style="display:flex;gap:0.5rem;">
          <select class="form-control" style="padding:0.3rem;font-size:0.8rem;border-radius:6px;" onchange="updateStatus(${o.id},this.value,'${o.order_type||'restaurant'}')">
            <option value="">Update Status</option>
            <option value="Confirmed">✅ Confirm</option>
            <option value="Preparing">👨‍🍳 Preparing</option>
            <option value="Out for Delivery">🛵 Out for Delivery</option>
            <option value="Delivered">✔️ Delivered</option>
            <option value="Cancelled">❌ Cancel</option>
          </select>
        </td>
      </tr>`).join('');
  }

  async function updateStatus(id, status, orderType='restaurant') {
    if (!status) return;
    let res;
    if (orderType === 'produce') {
      res = await PUT(`/produce/order/${id}/status`, { status });
    } else {
      res = await PUT(`/orders/${id}/status`, { status, user_id: user.user_id });
    }
    if (res?.success) { toast(`Order #${id} → ${status}`); loadOrders(); }
    else toast('Update failed', 'error');
  }

  async function viewOrder(id) {
    const o = await GET(`/orders/${id}`);
    if (!o) return;
    document.getElementById('order-modal-title').textContent = `Order #${id}`;
    document.getElementById('order-modal-content').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
        <div class="card"><div style="color:var(--text-muted);font-size:0.8rem;">Status</div><div>${statusBadge(o.status)}</div></div>
        <div class="card"><div style="color:var(--text-muted);font-size:0.8rem;">Total</div><div style="font-family:'Syne',sans-serif;font-weight:700;color:var(--primary);">PKR ${o.total_amount?.toFixed(0)}</div></div>
      </div>
      <div class="card" style="margin-bottom:1rem;">
        <div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.5rem;">Restaurant</div>
        <div style="font-weight:600;">${o.restaurant_name}</div>
      </div>
      <div class="card" style="margin-bottom:1rem;">
        <div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.5rem;">Delivery Address</div>
        <div>${o.delivery_address || 'N/A'}</div>
      </div>
      <div class="card">
        <div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.75rem;">Items Ordered</div>
        ${(o.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.9rem;"><span>${i.name} x${i.quantity}</span><span style="color:var(--primary);">PKR ${(i.unit_price*i.quantity).toFixed(0)}</span></div>`).join('')}
      </div>`;
    openModal('order-detail-modal');
  }

  loadOrders();
  setInterval(loadOrders, 20000);
</script>
</body>
</html>
