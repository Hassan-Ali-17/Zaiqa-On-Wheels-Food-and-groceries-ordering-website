<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Rider — My Deliveries</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--success);background:rgba(34,197,94,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">RIDER</span></a>
  <div class="nav-links">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="my-orders.html" class="active">📦 My Deliveries</a>
    <a href="profile.html">👤 Profile</a>
  </div>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div style="padding:2rem;max-width:800px;margin:0 auto;">
  <div class="page-header">
    <div class="page-title">My Deliveries</div>
    <div class="page-subtitle">Complete delivery history</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Order</th><th>Restaurant</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr>
      </thead>
      <tbody id="deliveries-tbody">
        <tr><td colspan="6" style="text-align:center;padding:2rem;"><div class="spinner" style="margin:auto;"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>
<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('rider');
  renderUserBadge('nav-user');

  async function loadDeliveries() {
    const riderData = await GET(`/rider/status/${user.user_id}`);
    if (!riderData) return;
    const data = await GET(`/orders/rider/${riderData.id}`);
    const tbody = document.getElementById('deliveries-tbody');
    if (!data?.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">No deliveries yet</td></tr>'; return; }
    tbody.innerHTML = data.map(o=>`
      <tr>
        <td><strong>#${o.id}</strong></td>
        <td>${o.restaurant_name}</td>
        <td>${o.customer_name}</td>
        <td style="color:var(--primary);font-weight:600;">PKR ${o.total_amount?.toFixed(0)}</td>
        <td>${statusBadge(o.status)}</td>
        <td style="color:var(--text-muted);font-size:0.85rem;">${timeAgo(o.created_at)}</td>
      </tr>`).join('');
  }

  loadDeliveries();
</script>
</body>
</html>
