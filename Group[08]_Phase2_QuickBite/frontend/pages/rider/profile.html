<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Rider — Profile</title>
  <link rel="stylesheet" href="../../css/main.css">
  <style>
    .profile-hero { display:flex; align-items:center; gap:1.5rem; padding:2rem; background:var(--card); border:1px solid var(--border); border-radius:20px; margin-bottom:1.5rem; }
    .avatar { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--success),#16A34A); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:800; color:white; flex-shrink:0; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--success);background:rgba(34,197,94,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">RIDER</span></a>
  <div class="nav-links">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="my-orders.html">📦 My Deliveries</a>
    <a href="profile.html" class="active">👤 Profile</a>
  </div>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div style="padding:2rem;max-width:600px;margin:0 auto;">
  <div class="page-header"><div class="page-title">My Profile</div></div>
  <div class="profile-hero" id="profile-hero"></div>
  <div class="card" id="rider-info" style="margin-bottom:1rem;"></div>
  <div class="card" id="rider-stats" style="margin-bottom:1.5rem;"></div>
  <button class="btn btn-danger btn-full" onclick="logout()">Sign Out</button>
</div>
<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('rider');
  renderUserBadge('nav-user');

  const initials = user.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('profile-hero').innerHTML = `
    <div class="avatar">🛵</div>
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;">${user.name}</div>
      <div style="color:var(--text-muted);font-size:0.9rem;">${user.email}</div>
      <div style="margin-top:0.5rem;"><span class="badge badge-rider">Rider</span></div>
    </div>`;

  async function loadInfo() {
    const riderData = await GET(`/rider/status/${user.user_id}`);
    if (riderData) {
      document.getElementById('rider-info').innerHTML = `
        <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1rem;">Vehicle Info</div>
        <div style="display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Vehicle</span><span>${riderData.vehicle_type}</span></div>
        <div style="display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">License</span><span>${riderData.license_plate||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;padding:0.6rem 0;"><span style="color:var(--text-muted);">Status</span><span>${statusBadge(riderData.status)}</span></div>`;

      if (riderData.status === 'approved') {
        const orders = await GET(`/orders/rider/${riderData.id}`);
        const delivered = (orders||[]).filter(o=>o.status==='Delivered');
        const earnings = delivered.reduce((s,o)=>s+(o.total_amount*0.1),0);
        document.getElementById('rider-stats').innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;text-align:center;">
            <div><div style="font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;">${(orders||[]).length}</div><div style="color:var(--text-muted);font-size:0.8rem;">Total Orders</div></div>
            <div><div style="font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;color:var(--success);">${delivered.length}</div><div style="color:var(--text-muted);font-size:0.8rem;">Delivered</div></div>
            <div><div style="font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;color:var(--primary);">PKR ${Math.round(earnings)}</div><div style="color:var(--text-muted);font-size:0.8rem;">Earnings (est.)</div></div>
          </div>`;
      }
    }
  }
  loadInfo();
</script>
</body>
</html>
