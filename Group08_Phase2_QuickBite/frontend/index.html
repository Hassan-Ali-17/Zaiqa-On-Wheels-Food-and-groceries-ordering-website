<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite — Login</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: radial-gradient(ellipse at 30% 20%, rgba(255,77,0,0.12) 0%, transparent 60%), var(--bg); }
    .auth-container { width:100%; max-width:460px; padding:1rem; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo h1 { font-family:'Syne',sans-serif; font-size:2.5rem; font-weight:800; }
    .auth-logo h1 span { color:var(--primary); }
    .auth-logo p { color:var(--text-muted); margin-top:0.25rem; }
    .auth-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2rem; }
    .auth-tabs { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; background:var(--bg3); border-radius:10px; padding:0.25rem; margin-bottom:1.5rem; }
    .auth-tab { padding:0.6rem; text-align:center; border-radius:8px; border:none; background:none; color:var(--text-muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.2s; }
    .auth-tab.active { background:var(--primary); color:white; }
    .role-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:1.2rem; }
    .role-card { border:2px solid var(--border); border-radius:12px; padding:0.85rem 0.5rem; text-align:center; cursor:pointer; transition:all 0.2s; }
    .role-card:hover { border-color:var(--primary); }
    .role-card.selected { border-color:var(--primary); background:rgba(255,77,0,0.08); }
    .role-icon { font-size:1.8rem; margin-bottom:0.3rem; }
    .role-name { font-weight:600; font-size:0.85rem; }
    .role-desc { font-size:0.7rem; color:var(--text-muted); margin-top:0.15rem; }
    .rider-extra,.manager-extra { display:none; }
    .rider-extra.visible,.manager-extra.visible { display:block; }
    .hint { text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:0.75rem; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-logo">
    <h1>Quick<span>Bite</span></h1>
    <p>Fast food delivery platform</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Login</button>
      <button class="auth-tab" onclick="showTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()">Sign In →</button>
     <!-- <div class="hint">Admin: ahsen@gmail.com / hassan</div> -->
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">I want to join as</label>
        <div class="role-grid">
          <div class="role-card selected" onclick="selectRole('customer',this)">
            <div class="role-icon">🛒</div>
            <div class="role-name">Customer</div>
            <div class="role-desc">Order food</div>
          </div>
          <div class="role-card" onclick="selectRole('rider',this)">
            <div class="role-icon">🛵</div>
            <div class="role-name">Rider</div>
            <div class="role-desc">Deliver orders</div>
          </div>
          <div class="role-card" onclick="selectRole('manager',this)">
            <div class="role-icon">🍽️</div>
            <div class="role-name">Restaurant Manager</div>
            <div class="role-desc">List your restaurant</div>
          </div>
        </div>
        <input type="hidden" id="signup-role" value="customer">
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="signup-name" class="form-control" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="signup-email" class="form-control" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="text" id="signup-phone" class="form-control" placeholder="03xx-xxxxxxx">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signup-password" class="form-control" placeholder="••••••••">
      </div>
      <!-- Rider extra fields -->
      <div class="rider-extra" id="rider-extra">
        <div class="form-group">
          <label class="form-label">Vehicle Type</label>
          <select id="signup-vehicle" class="form-control">
            <option value="Bike">🏍️ Bike</option>
            <option value="Scooter">🛵 Scooter</option>
            <option value="Car">🚗 Car</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">License Plate</label>
          <input type="text" id="signup-license" class="form-control" placeholder="ABC-123">
        </div>
      </div>
      <!-- Manager note -->
      <div class="manager-extra" id="manager-extra">
        <div style="background:rgba(255,77,0,0.08);border:1px solid rgba(255,77,0,0.3);border-radius:10px;padding:0.85rem;margin-bottom:1rem;font-size:0.85rem;color:var(--text-muted);">
          🍽️ After signing up, you'll be able to add your restaurant with menu items. Admin will review and approve before it goes live.
        </div>
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doSignup()">Create Account →</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/shared.js"></script>
<script>
  const u = getUser();
  if (u) redirectUser(u);

  function redirectUser(user) {
    if (user.role==='admin') window.location.href='pages/admin/dashboard.html';
    else if (user.role==='customer') window.location.href='pages/customer/home.html';
    else if (user.role==='manager') {
      if (user.restaurant_id) {
        if (user.restaurant_status==='approved') window.location.href='pages/manager/dashboard.html';
        else window.location.href='pages/manager/pending.html';
      } else window.location.href='pages/manager/setup.html';
    } else if (user.role==='rider') {
      if (user.rider_status==='approved') window.location.href='pages/rider/dashboard.html';
      else window.location.href='pages/rider/pending.html';
    }
  }

  function showTab(tab) {
    document.getElementById('login-form').style.display = tab==='login'?'block':'none';
    document.getElementById('signup-form').style.display = tab==='signup'?'block':'none';
    document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  }

  function selectRole(role, el) {
    document.getElementById('signup-role').value = role;
    document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('rider-extra').classList.toggle('visible', role==='rider');
    document.getElementById('manager-extra').classList.toggle('visible', role==='manager');
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    if (!email||!password) { toast('Please fill all fields','error'); return; }
    const res = await POST('/login', {email,password});
    if (res?.success) { setUser(res); toast('Welcome back!'); setTimeout(()=>redirectUser(res),800); }
    else toast(res?.error||'Login failed','error');
  }

  async function doSignup() {
    const role = document.getElementById('signup-role').value;
    const body = {
      name: document.getElementById('signup-name').value,
      email: document.getElementById('signup-email').value,
      phone: document.getElementById('signup-phone').value,
      password: document.getElementById('signup-password').value,
      role
    };
    if (role==='rider') { body.vehicle_type=document.getElementById('signup-vehicle').value; body.license_plate=document.getElementById('signup-license').value; }
    if (!body.name||!body.email||!body.password) { toast('Please fill all fields','error'); return; }
    const res = await POST('/signup', body);
    if (res?.success) { toast('Account created! Please login.'); setTimeout(()=>showTab('login'),1200); }
    else toast(res?.error||'Signup failed','error');
  }

  document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&document.getElementById('login-form').style.display!=='none') doLogin(); });
</script>
</body>
</html>
