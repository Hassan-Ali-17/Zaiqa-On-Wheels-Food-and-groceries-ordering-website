<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Admin — Dashboard</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--primary);background:rgba(255,77,0,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">ADMIN</span></a>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>

<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html" class="sidebar-link active"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="restaurants.html" class="sidebar-link"><span class="sidebar-icon">🍽️</span> Restaurants</a>
    <div class="sidebar-section">People</div>
    <a href="riders.html" class="sidebar-link"><span class="sidebar-icon">🛵</span> Riders</a>
    <a href="users.html" class="sidebar-link"><span class="sidebar-icon">👥</span> Users</a>
    <a href="chat.html" class="sidebar-link"><span class="sidebar-icon">💬</span> Support Chat</a>
    <div class="sidebar-section">System</div>
    <a href="promos.html" class="sidebar-link"><span class="sidebar-icon">🎟️</span> Promo Codes</a>
    <a href="audit.html" class="sidebar-link"><span class="sidebar-icon">📋</span> Audit Log</a>
    <div style="margin-top:auto;padding-top:2rem;">
      <button class="sidebar-link" onclick="logout()" style="width:100%;background:none;border:none;cursor:pointer;color:var(--danger);">
        <span class="sidebar-icon">🚪</span> Logout
      </button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle">Welcome back, Admin</div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="loader"><div class="spinner"></div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
      <div class="card">
        <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1rem;">Recent Orders</div>
        <div id="recent-orders"><div class="loader"><div class="spinner"></div></div></div>
        <a href="orders.html" style="display:block;text-align:center;margin-top:1rem;color:var(--primary);font-size:0.85rem;">View all orders →</a>
      </div>
      <div class="card">
        <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1rem;">Pending Rider Approvals</div>
        <div id="pending-riders"><div class="loader"><div class="spinner"></div></div></div>
        <a href="riders.html" style="display:block;text-align:center;margin-top:1rem;color:var(--primary);font-size:0.85rem;">Manage riders →</a>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('admin');
  renderUserBadge('nav-user');

  async function loadDashboard() {
    const [stats, orders, riders] = await Promise.all([
      GET('/admin/stats'),
      GET('/admin/orders'),
      GET('/admin/riders')
    ]);

    if (stats) {
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-label">Total Orders</div><div class="stat-value">${stats.total_orders}</div></div>
        <div class="stat-card" style="border-color:var(--primary);"><div class="stat-icon">🏢</div><div class="stat-label">Platform Revenue (5%)</div><div class="stat-value" style="color:var(--primary);">PKR ${Math.round(stats.platform_revenue||0).toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Total GMV</div><div class="stat-value">PKR ${Math.round((stats.revenue||0)/1000)}K</div></div>
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Customers</div><div class="stat-value">${stats.total_users}</div></div>
        <div class="stat-card"><div class="stat-icon">🛵</div><div class="stat-label">Riders</div><div class="stat-value">${stats.total_riders}</div></div>
        <div class="stat-card" style="border-color:${stats.pending_riders>0?'var(--warning)':'var(--border)'}">
          <div class="stat-icon">⏳</div><div class="stat-label">Pending Riders</div>
          <div class="stat-value" style="color:${stats.pending_riders>0?'var(--warning)':'var(--text)'}">${stats.pending_riders}</div>
        </div>
        <div class="stat-card"><div class="stat-icon">🍽️</div><div class="stat-label">Restaurants</div><div class="stat-value">${stats.total_restaurants}</div></div>
        <div class="stat-card" style="border-color:${stats.pending_restaurants>0?'var(--warning)':'var(--border)'}">
          <div class="stat-icon">🕐</div><div class="stat-label">Pending Restaurants</div>
          <div class="stat-value" style="color:${stats.pending_restaurants>0?'var(--warning)':'var(--text)'}">${stats.pending_restaurants}</div>
        </div>`;
    }

    if (orders) {
      const recent = orders.slice(0,5);
      document.getElementById('recent-orders').innerHTML = recent.length ? recent.map(o => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);">
          <div><div style="font-size:0.9rem;font-weight:500;">#${o.id} — ${o.restaurant_name}</div><div style="font-size:0.75rem;color:var(--text-muted);">${o.customer_name}</div></div>
          <div style="text-align:right;">${statusBadge(o.status)}<div style="font-size:0.75rem;color:var(--text-muted);">PKR ${o.total_amount?.toFixed(0)}</div></div>
        </div>`).join('') : '<p style="color:var(--text-muted);font-size:0.9rem;">No orders yet</p>';
    }

    if (riders) {
      const pending = riders.filter(r=>r.status==='pending');
      document.getElementById('pending-riders').innerHTML = pending.length ? pending.map(r => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);">
          <div><div style="font-size:0.9rem;font-weight:500;">${r.name}</div><div style="font-size:0.75rem;color:var(--text-muted);">${r.vehicle_type} • ${r.email}</div></div>
          <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-success btn-sm" onclick="approveRider(${r.id},true)">✓</button>
            <button class="btn btn-danger btn-sm" onclick="approveRider(${r.id},false)">✗</button>
          </div>
        </div>`).join('') : '<p style="color:var(--text-muted);font-size:0.9rem;">No pending approvals</p>';
    }
  }

  async function approveRider(id, approve) {
    const res = await PUT(`/admin/riders/${id}/approve`, { status: approve?'approved':'rejected', admin_id: user.user_id });
    if (res?.success) { toast(approve?'Rider approved!':'Rider rejected'); loadDashboard(); }
  }

  loadDashboard();
  setInterval(loadDashboard, 30000);
</script>
</body>
</html>
