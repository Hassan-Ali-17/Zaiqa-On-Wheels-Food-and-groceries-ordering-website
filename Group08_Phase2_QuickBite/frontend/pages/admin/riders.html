<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite Admin — Riders</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo">Quick<span>Bite</span> <span style="font-size:0.7rem;color:var(--primary);background:rgba(255,77,0,0.15);padding:2px 8px;border-radius:4px;margin-left:4px;">ADMIN</span></a>
  <div class="nav-user" id="nav-user"></div>
  <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">☀️ Light</button>
</nav>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
    <a href="orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Orders</a>
    <a href="restaurants.html" class="sidebar-link"><span class="sidebar-icon">🍽️</span> Restaurants</a>
    <div class="sidebar-section">People</div>
    <a href="riders.html" class="sidebar-link active"><span class="sidebar-icon">🛵</span> Riders</a>
    <a href="users.html" class="sidebar-link"><span class="sidebar-icon">👥</span> Users</a>
    <a href="chat.html" class="sidebar-link"><span class="sidebar-icon">💬</span> Support Chat</a>
    <div class="sidebar-section">System</div>
    <a href="promos.html" class="sidebar-link"><span class="sidebar-icon">🎟️</span> Promo Codes</a>
    <a href="audit.html" class="sidebar-link"><span class="sidebar-icon">📋</span> Audit Log</a>
  </nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="page-title">Riders</div>
        <div class="page-subtitle">Approve and manage delivery riders</div>
      </div>
      <div class="tabs" style="margin-bottom:0;">
        <button class="tab-btn active" onclick="filterRiders('all',this)">All</button>
        <button class="tab-btn" onclick="filterRiders('pending',this)" id="pending-tab">⚠️ Pending</button>
        <button class="tab-btn" onclick="filterRiders('approved',this)">Approved</button>
        <button class="tab-btn" onclick="filterRiders('rejected',this)">Rejected</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Rider</th>
            <th>Contact</th>
            <th>Vehicle</th>
            <th>License</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="riders-tbody">
          <tr><td colspan="6" style="text-align:center;padding:2rem;"><div class="spinner" style="margin:auto;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div id="toast"></div>
<script src="../../js/shared.js"></script>
<script>
  const user = requireAuth('admin');
  renderUserBadge('nav-user');

  let allRiders = [];
  let currentFilter = 'all';

  async function loadRiders() {
    const data = await GET('/admin/riders');
    allRiders = data || [];
    const pendingCount = allRiders.filter(r=>r.status==='pending').length;
    const ptab = document.getElementById('pending-tab');
    if (pendingCount > 0) ptab.textContent = `⚠️ Pending (${pendingCount})`;
    filterRiders(currentFilter, null);
  }

  function filterRiders(status, el) {
    currentFilter = status;
    if (el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }
    const list = status === 'all' ? allRiders : allRiders.filter(r => r.status === status);
    const tbody = document.getElementById('riders-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">No riders found</td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(r => `
      <tr>
        <td>
          <div style="font-weight:600;">${r.name}</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">#${r.id}</div>
        </td>
        <td>
          <div style="font-size:0.85rem;">${r.email}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);">${r.phone}</div>
        </td>
        <td>${r.vehicle_type}</td>
        <td style="font-family:monospace;font-size:0.85rem;">${r.license_plate || '—'}</td>
        <td>${statusBadge(r.status)}</td>
        <td>
          <div style="display:flex;gap:0.5rem;">
            ${r.status !== 'approved' ? `<button class="btn btn-success btn-sm" onclick="approveRider(${r.id},'approved')">✓ Approve</button>` : ''}
            ${r.status !== 'rejected' ? `<button class="btn btn-danger btn-sm" onclick="approveRider(${r.id},'rejected')">✗ Reject</button>` : ''}
            ${r.status === 'rejected' ? `<button class="btn btn-outline btn-sm" onclick="approveRider(${r.id},'pending')">↩ Reset</button>` : ''}
          </div>
        </td>
      </tr>`).join('');
  }

  async function approveRider(id, status) {
    const res = await PUT(`/admin/riders/${id}/approve`, { status, admin_id: user.user_id });
    if (res?.success) { toast(`Rider ${status}`); loadRiders(); }
    else toast('Failed', 'error');
  }

  loadRiders();
  setInterval(loadRiders, 15000);
</script>
</body>
</html>
